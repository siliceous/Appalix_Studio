services:
  - type: web
    name: appalix-api
    runtime: node
    rootDir: apps/api
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      # Set these in the Render dashboard (Environment tab):
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      # Optional — leave blank if not using Redis / platform OAuth yet
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: FACEBOOK_APP_SECRET
        sync: false
      - key: WHATSAPP_APP_SECRET
        sync: false
      - key: WORDPRESS_WEBHOOK_SECRET
        sync: false
