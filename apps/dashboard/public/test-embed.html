<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Embed Test · Appalix Forms</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 720px; margin: 40px auto; padding: 0 20px; color: #1f2937; line-height: 1.6; }
    h1 { font-size: 22px; margin-bottom: 4px; }
    p.lead { color: #6b7280; margin-top: 0; }
    code { background: #f3f4f6; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
    .note { background: #fef3c7; border-left: 3px solid #f59e0b; padding: 12px 16px; border-radius: 6px; font-size: 14px; margin: 24px 0; }
    .stage { border: 1px dashed #d1d5db; border-radius: 8px; padding: 24px; margin-top: 24px; min-height: 200px; background: #fafafa; }
  </style>
</head>
<body>
  <h1>Embed test page</h1>
  <p class="lead">Replace <code>YOUR_EMBED_KEY</code> below with the key shown in the form's Embed tab, then reload.</p>

  <div class="note">
    Open DevTools → Console. Logs prefixed <code>[Appalix Forms]</code> show what the embed script is doing.
  </div>

  <div class="stage">
    <p style="text-align:center;color:#9ca3af;font-size:13px;margin:0 0 16px;">↓ Embedded form renders here (for inline forms) ↓</p>

    <!-- Replace the data-form-key value with your real key -->
    <script src="/embed.js" data-form-key="YOUR_EMBED_KEY" async></script>
  </div>
</body>
</html>
